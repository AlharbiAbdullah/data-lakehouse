name: "nyc_taxi_lakehouse"
version: "1.0.0"
config-version: 2

profile: "nyc_taxi_lakehouse"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  nyc_taxi_lakehouse:
    # Bronze layer - staging models
    staging:
      +materialized: view
      +schema: staging

    # Silver layer - intermediate models
    intermediate:
      +materialized: view
      +schema: intermediate

    # Gold layer - mart models
    marts:
      +materialized: table
      +schema: marts

seeds:
  nyc_taxi_lakehouse:
    +schema: seeds
